<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regal Interface</title>
    <style>
        /* Base Reset & Typography */
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: #333;
            line-height: 1.6;
        }

        header {
            padding: 40px 20px;
            text-align: center;
            background: #fff;
        }

        section {
            padding: 80px 20px;
            text-align: center;
        }

        /* Gold glow on images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(242, 201, 76, 0.25);
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.02);
        }

        /* Soft gold section tint (alternating) */
        section:nth-child(even) {
            background: linear-gradient(to bottom, #FFFFFF, #FFF9E6);
        }

        /* Rich red buttons */
        .btn {
            display: inline-block;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #FFFFFF;
            padding: 15px 35px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, #D92D2D, #FF3B3B);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(217, 45, 45, 0.2);
        }

        /* Hover effect for buttons */
        .btn:hover {
            background: linear-gradient(135deg, #FF3B3B, #D92D2D);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(217, 45, 45, 0.4);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #222;
        }
    </style>
</head>
<body>

    <header>
        <h1>Project Showcase</h1>
    </header>

    <section>
        <div class="container">
            <h2>The Vision</h2>
            <p>Experience a design where subtle gold undertones meet bold action.</p>
            <img src="https://via.placeholder.com/600x350" alt="Showcase Image">
        </div>
    </section>

    <section>
        <div class="container">
            <h2>Take Action</h2>
            <p>Our buttons are designed to stand out against the warmth of the layout.</p>
            <div style="margin-top: 30px;">
                <a href="#" class="btn">Get Started Now</a>
            </div>
        </div>
    </section>

    <section>
        <div class="container">
            <h2>Visual Depth</h2>
            <p>Notice the soft golden glow surrounding the imagery below.</p>
            <img src="https://via.placeholder.com/600x350" alt="Depth Image">
        </div>
    </section>

</body>
</html>
